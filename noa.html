<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0d0f1a" id="theme-meta">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Noa">
  <title>Noa</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0d0f1a;--surface:rgba(13,15,28,0.92);--surface2:rgba(18,20,38,0.95);
      --border:rgba(200,150,220,0.12);--borderhi:rgba(232,85,154,0.28);
      --text:#ede8f5;--muted:#9080b0;--faint:#3a3060;--inputbg:rgba(15,12,32,0.92);
      --pink:#e8559a;--pinksoft:#f0a0c8;--pinkglow:rgba(232,85,154,0.25);
      --font:"DM Sans","Helvetica Neue",sans-serif;--ease:cubic-bezier(0.16,1,0.3,1);
    }
    [data-day]{--bg:#f2ecf8;--surface:rgba(242,236,250,0.92);--surface2:rgba(235,228,248,0.96);--border:rgba(180,120,200,0.14);--borderhi:rgba(204,68,136,0.28);--text:#2a1a38;--muted:#7a5090;--faint:#c0a8d0;--inputbg:rgba(248,242,255,0.96);--pink:#cc4488;--pinksoft:#e890bc;--pinkglow:rgba(204,68,136,0.18);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{height:100%;-webkit-text-size-adjust:100%;}
    body{height:100dvh;font-family:var(--font);color:var(--text);overflow:hidden;display:flex;flex-direction:column;align-items:center;background:var(--bg);transition:background 600ms var(--ease),color 400ms;position:fixed;width:100%;}
    button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
    textarea{font:inherit;color:inherit;}
    @media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
    .orbstage{position:fixed;top:0;left:0;right:0;height:58dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:1;pointer-events:none;}
    #orbwrap{position:relative;}
    #orbc{display:block;border-radius:50%;}
    .lname{font-size:.72rem;font-weight:300;letter-spacing:.3em;text-transform:uppercase;color:var(--faint);display:flex;align-items:center;gap:6px;transition:color 400ms var(--ease);}
    .lname.lit{color:var(--pink);}
    .ldot{width:4px;height:4px;border-radius:50%;background:currentColor;}
    .ldot.pulse{animation:pulse 1s ease-in-out infinite;}
    .ldot.blink{animation:blink .45s ease-in-out infinite alternate;}
    .panel{position:fixed;bottom:0;left:0;right:0;height:44dvh;display:flex;flex-direction:column;z-index:10;padding:6px 16px max(16px,env(safe-area-inset-bottom));background:linear-gradient(to top,var(--surface) 80%,transparent);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);transition:background 600ms,bottom 300ms var(--ease);}
    .msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:9px;padding-bottom:4px;scrollbar-width:none;mask-image:linear-gradient(to bottom,transparent 0,black 18%);-webkit-mask-image:linear-gradient(to bottom,transparent 0,black 18%);}
    .msgs::-webkit-scrollbar{display:none;}
    .bbl{max-width:min(66ch,85%);padding:9px 14px;border-radius:17px;font-size:clamp(.83rem,.8rem + .2vw,.93rem);line-height:1.55;animation:bIn 280ms var(--ease) both;word-break:break-word;}
    .bbl.noa{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px;}
    .bbl.usr{align-self:flex-end;background:rgba(232,85,154,.14);border:1px solid rgba(232,85,154,.28);border-bottom-right-radius:4px;}
    [data-day] .bbl.usr{background:rgba(204,68,136,.09);border-color:rgba(204,68,136,.18);}
    .bbl.usr img{max-width:160px;max-height:130px;border-radius:9px;display:block;margin-top:5px;}
    .tdots{display:flex;gap:5px;padding:9px 13px;align-self:flex-start;}
    .tdots span{width:6px;height:6px;border-radius:50%;background:var(--faint);animation:typing 1.1s ease-in-out infinite;}
    .tdots span:nth-child(2){animation-delay:.18s;}
    .tdots span:nth-child(3){animation-delay:.36s;}
    .toolbar{display:flex;flex-direction:column;gap:7px;margin-top:5px;}
    .chips{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;max-height:0;overflow:hidden;opacity:0;transition:max-height 320ms var(--ease),opacity 260ms;}
    .chips::-webkit-scrollbar{display:none;}
    .chips.open{max-height:42px;opacity:1;}
    .chip{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:999px;border:1px solid var(--border);background:var(--surface2);font-size:.73rem;color:var(--muted);white-space:nowrap;flex-shrink:0;transition:border-color 160ms,color 160ms,transform 120ms;}
    .chip:hover{border-color:var(--borderhi);color:var(--pink);transform:translateY(-1px);}
    .chip.on{border-color:var(--pink);color:var(--pink);background:rgba(232,85,154,.08);}
    .chip svg{width:12px;height:12px;}
    .fprev{display:none;align-items:center;gap:8px;padding:5px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:11px;animation:bIn 220ms var(--ease) both;}
    .fprev.show{display:flex;}
    .fprev img{width:32px;height:32px;border-radius:6px;object-fit:cover;}
    .fprev .fn{font-size:.72rem;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .fprev .fx{color:var(--faint);transition:color 140ms;}
    .fprev .fx:hover{color:var(--pink);}
    .fprev .fx svg{width:13px;height:13px;}
    .irow{display:flex;align-items:flex-end;gap:9px;}
    .plus{width:40px;height:40px;min-width:40px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0;transition:border-color 180ms,color 180ms,transform 260ms var(--ease);}
    .plus.open{transform:rotate(45deg);border-color:var(--pink);color:var(--pink);}
    .plus svg{width:15px;height:15px;}
    .iwrap{flex:1;}
    .msgi{width:100%;background:var(--inputbg);border:1px solid var(--border);border-radius:20px;padding:10px 15px;font-size:clamp(.83rem,.8rem + .2vw,.93rem);outline:none;resize:none;min-height:40px;max-height:108px;line-height:1.5;transition:border-color 160ms,box-shadow 160ms;}
    .msgi::placeholder{color:var(--faint);}
    .msgi:focus{border-color:rgba(232,85,154,.30);box-shadow:0 0 0 3px rgba(232,85,154,.06);}
    .sndbtn{width:40px;height:40px;min-width:40px;border-radius:50%;background:var(--pink);box-shadow:0 0 0 6px var(--pinkglow);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;transition:background 180ms,box-shadow 180ms,transform 160ms;}
    .sndbtn:hover{background:var(--pinksoft);box-shadow:0 0 0 10px var(--pinkglow);transform:translateY(-1px);}
    .sndbtn:active{transform:none;}
    .sndbtn svg{width:15px;height:15px;}
    .topbar{position:fixed;top:max(12px,env(safe-area-inset-top));left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:20;pointer-events:none;}
    .topbar>*{pointer-events:all;}
    .ibtn{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--faint);transition:color 160ms,background 160ms;}
    .ibtn:hover{color:var(--muted);background:var(--border);}
    .ibtn svg{width:16px;height:16px;}
    .tpill{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:3px;gap:2px;}
    .topt{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--faint);transition:background 180ms,color 180ms;}
    .topt.on{background:var(--pink);color:#fff;}
    .ov{position:fixed;inset:0;background:rgba(10,8,24,.80);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:50;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 250ms var(--ease);}
    [data-day] .ov{background:rgba(140,110,170,.45);}
    .ov.open{opacity:1;pointer-events:all;}
    .sheet{width:100%;max-width:500px;background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:18px 18px max(22px,env(safe-area-inset-bottom));transform:translateY(50px);transition:transform 320ms var(--ease);max-height:88dvh;overflow-y:auto;scrollbar-width:none;}
    .sheet::-webkit-scrollbar{display:none;}
    .ov.open .sheet{transform:none;}
    .shdl{width:30px;height:3px;border-radius:999px;background:var(--faint);margin:0 auto 16px;}
    .stit{font-size:.92rem;font-weight:400;margin-bottom:14px;}
    .sbadge{display:inline-flex;align-items:center;gap:6px;font-size:.71rem;color:var(--faint);padding:3px 10px;border-radius:999px;border:1px solid var(--border);margin-bottom:14px;}
    .sbadge.ok{color:#5ca83a;border-color:rgba(92,168,58,.25);}
    .sbadge.err{color:#d06090;border-color:rgba(208,96,144,.25);}
    .sbdot{width:5px;height:5px;border-radius:50%;background:currentColor;}
    .fld{margin-bottom:12px;}
    .flbl{display:block;font-size:.68rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
    .fin{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:9px 13px;font-size:.83rem;outline:none;transition:border-color 150ms;color:var(--text);}
    .fin:focus{border-color:rgba(232,85,154,.32);}
    .fin::placeholder{color:var(--faint);}
    .fhint{font-size:.68rem;color:var(--faint);margin-top:3px;}
    .cgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px;}
    .ccard{padding:9px 11px;border-radius:11px;border:1px solid var(--border);background:var(--surface2);display:flex;flex-direction:column;gap:4px;}
    .ccard:hover{border-color:var(--borderhi);}
    .chead{display:flex;align-items:center;gap:5px;font-size:.78rem;font-weight:400;}
    .chead svg{width:13px;height:13px;color:var(--pink);}
    .chint{font-size:.67rem;color:var(--faint);}
    .cbadge{font-size:.59rem;padding:2px 6px;border-radius:999px;display:inline-block;margin-top:1px;}
    .cbadge.act{background:rgba(232,85,154,.10);color:var(--pink);border:1px solid rgba(232,85,154,.20);}
    .cbadge.soon{background:rgba(60,40,80,.15);color:var(--faint);border:1px solid var(--border);}
    .savebtn{width:100%;padding:11px;background:var(--pink);color:#fff;border-radius:999px;font-size:.85rem;margin-top:6px;transition:background 160ms,transform 140ms;}
    .savebtn:hover{background:var(--pinksoft);}
    .anthropic-btn{width:100%;padding:10px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:999px;font-size:.78rem;margin-top:8px;transition:border-color 160ms,color 160ms;display:flex;align-items:center;justify-content:center;gap:6px;}
    .anthropic-btn:hover{border-color:var(--borderhi);color:var(--pink);}
    .toast{position:fixed;top:max(12px,env(safe-area-inset-top));left:50%;transform:translateX(-50%) translateY(-66px);background:var(--surface2);border:1px solid var(--border);padding:7px 15px;border-radius:999px;font-size:.73rem;white-space:nowrap;z-index:100;pointer-events:none;transition:transform 280ms var(--ease);box-shadow:0 4px 18px rgba(0,0,0,.22);}
    .toast.show{transform:translateX(-50%) translateY(0);}
    #filein{display:none;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.6);}}
    @keyframes blink{from{opacity:.3;}to{opacity:1;}}
    @keyframes typing{0%,60%,100%{transform:translateY(0);opacity:.35;}30%{transform:translateY(-5px);opacity:1;}}
    @keyframes bIn{from{opacity:0;transform:translateY(5px) scale(.97);}to{opacity:1;transform:none;}}
  </style>
</head>
<body>
<div class="orbstage">
  <div id="orbwrap"><canvas id="orbc"></canvas></div>
  <div class="lname" id="lname"><span class="ldot" id="ldot"></span>luno</div>
</div>
<div class="topbar">
  <button class="ibtn" id="cfgbtn" aria-label="Configuración">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
  <div class="tpill">
    <button class="topt on" id="tnight" aria-label="Noche">🌙</button>
    <button class="topt" id="tday" aria-label="Día">☀️</button>
  </div>
</div>
<main class="panel" id="panel">
  <div class="msgs" id="msgs" role="log" aria-live="polite"></div>
  <div class="toolbar">
    <div class="fprev" id="fprev">
      <img id="fthumb" src="" alt=""><span class="fn" id="fname"></span>
      <button class="fx" id="frm" aria-label="Quitar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="chips" id="chips">
      <button class="chip" id="cph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>foto</button>
      <button class="chip" id="cdc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>doc</button>
      <button class="chip" id="cwb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>buscar web</button>
      <button class="chip" id="cmm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2a7 7 0 0 1 7 7c0 3.5-2.5 6-7 10C7.5 15 5 12.5 5 9a7 7 0 0 1 7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>mem0</button>
    </div>
    <div class="irow">
      <button class="plus" id="plus" aria-expanded="false"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      <div class="iwrap"><textarea class="msgi" id="msgi" placeholder="escríbele a noa…" rows="1" autocorrect="on" spellcheck="true"></textarea></div>
      <button class="sndbtn" id="sndbtn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
    </div>
  </div>
</main>
<div class="ov" id="ov" role="dialog" aria-modal="true">
  <div class="sheet">
    <div class="shdl"></div>
    <h2 class="stit">configuración</h2>
    <div class="sbadge" id="sbadge"><span class="sbdot" id="sbdot"></span><span id="sbtext">sin verificar</span></div>
    <div class="fld"><label class="flbl" for="furl">URL de Flowise</label><input class="fin" id="furl" type="url" placeholder="https://tu-flowise.railway.app" spellcheck="false"><p class="fhint">Base URL en Railway</p></div>
    <div class="fld"><label class="flbl" for="fid">Chatflow ID</label><input class="fin" id="fid" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" spellcheck="false"><p class="fhint">Flowise → chatflow → Share → API Endpoint</p></div>
    <div class="fld"><label class="flbl" for="fkey">API Key (opcional)</label><input class="fin" id="fkey" type="password" placeholder="Vacío si acceso abierto"></div>
    <p class="flbl" style="margin-bottom:8px">capacidades</p>
    <div class="cgrid">
      <div class="ccard"><div class="chead"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Vision</div><div class="chint">Fotos y docs</div><span class="cbadge soon">config pendiente</span></div>
      <div class="ccard"><div class="chead"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Web Search</div><div class="chint">Internet real</div><span class="cbadge soon">config pendiente</span></div>
      <div class="ccard"><div class="chead"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2a7 7 0 0 1 7 7c0 3.5-2.5 6-7 10C7.5 15 5 12.5 5 9a7 7 0 0 1 7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>Mem0</div><div class="chint">Memoria persistente</div><span class="cbadge soon">config pendiente</span></div>
      <div class="ccard"><div class="chead"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Texto</div><div class="chint">Chat activo</div><span class="cbadge act">activo</span></div>
    </div>
    <button class="savebtn" id="savebtn">guardar y conectar</button>
    <button class="anthropic-btn" id="anthropicbtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2L2 19h20L12 2z"/></svg>
      recargar créditos de Claude
    </button>
  </div>
</div>
<div class="toast" id="toast" role="alert"></div>
<input type="file" id="filein" accept="image/*,.pdf,.txt,.doc,.docx">
<script>
var S={url:'https://flowise-production-0189.up.railway.app',id:'',key:'',day:false,mode:'idle',loading:false,file:null,webOn:false,memOn:false,session:'noa-'+Math.random().toString(36).slice(2)};
var canvas=document.getElementById('orbc'),ctx=canvas.getContext('2d');
var SIZE=Math.min(Math.round(window.innerWidth*0.62),280),DPR=window.devicePixelRatio||1;
canvas.width=SIZE*DPR;canvas.height=SIZE*DPR;canvas.style.width=SIZE+'px';canvas.style.height=SIZE+'px';ctx.scale(DPR,DPR);
var CX=SIZE/2,CY=SIZE/2,BASE_R=SIZE*0.30;
var orbState={t:0,R:BASE_R,tR:BASE_R,alpha:1.0,tAlpha:1.0,freq:0,tFreq:0,flares:(function(){var arr=[];for(var i=0;i<6;i++)arr.push({a:Math.random()*Math.PI*2,d:BASE_R*0.3+Math.random()*BASE_R*0.5,sz:SIZE*0.04+Math.random()*SIZE*0.1,al:0,tal:0,life:0,next:60+Math.floor(Math.random()*180)});return arr;})()};
function lerp(a,b,t){return a+(b-a)*t;}
function noise(angle,time,seed){seed=seed||0;return Math.sin(angle*2.1+time*0.55+seed)*0.38+Math.sin(angle*3.6+time*0.38+seed*1.4)*0.22+Math.sin(angle*5.2+time*0.72+seed*0.8)*0.13+Math.sin(angle*1.3+time*0.28+seed*2.2)*0.09;}
function orbPoints(r,noiseAmp,timeOff){timeOff=timeOff||0;var pts=[],N=100;for(var i=0;i<=N;i++){var a=(i/N)*Math.PI*2,n=noise(a,orbState.t+timeOff,0)+noise(a*0.5,orbState.t*0.65+timeOff,1)*0.35,rr=r+n*noiseAmp;pts.push([CX+Math.cos(a)*rr,CY+Math.sin(a)*rr]);}return pts;}
function tracePath(pts){ctx.beginPath();for(var i=0;i<pts.length;i++){if(i===0)ctx.moveTo(pts[i][0],pts[i][1]);else ctx.lineTo(pts[i][0],pts[i][1]);}ctx.closePath();}
function setMode(m){S.mode=m;var dot=document.getElementById('ldot'),nm=document.getElementById('lname');dot.className='ldot';nm.className='lname';switch(m){case 'idle':orbState.tR=BASE_R;orbState.tAlpha=1.0;orbState.tFreq=0;break;case 'listening':orbState.tR=BASE_R*0.92;orbState.tAlpha=0.85;orbState.tFreq=0;dot.classList.add('pulse'
